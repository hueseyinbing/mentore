name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build-release-android:
    name: Build Android Release
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: app/mentore_app

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Build APK
        run: flutter build apk --release

      - name: Build App Bundle
        run: flutter build appbundle --release

      - name: Upload Android artifacts
        uses: actions/upload-artifact@v4
        with:
          name: android-release
          path: |
            app/mentore_app/build/app/outputs/flutter-apk/app-release.apk
            app/mentore_app/build/app/outputs/bundle/release/app-release.aab

  build-release-ios:
    name: Build iOS Release
    runs-on: macos-latest
    defaults:
      run:
        working-directory: app/mentore_app

    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Build iOS
        run: flutter build ios --release --no-codesign

      - name: Upload iOS artifact
        uses: actions/upload-artifact@v4
        with:
          name: ios-release
          path: app/mentore_app/build/ios/iphoneos

  build-release-macos:
    name: Build macOS Release
    runs-on: macos-latest
    defaults:
      run:
        working-directory: app/mentore_app

    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Build macOS
        run: flutter build macos --release

      - name: Upload macOS artifact
        uses: actions/upload-artifact@v4
        with:
          name: macos-release
          path: app/mentore_app/build/macos/Build/Products/Release

  build-release-linux:
    name: Build Linux Release
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: app/mentore_app

    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Install Linux dependencies
        run: |
          sudo apt-get update -y
          sudo apt-get install -y ninja-build libgtk-3-dev

      - name: Install dependencies
        run: flutter pub get

      - name: Build Linux
        run: flutter build linux --release

      - name: Upload Linux artifact
        uses: actions/upload-artifact@v4
        with:
          name: linux-release
          path: app/mentore_app/build/linux/x64/release/bundle

  build-release-windows:
    name: Build Windows Release
    runs-on: windows-latest
    defaults:
      run:
        working-directory: app/mentore_app

    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Build Windows
        run: flutter build windows --release

      - name: Upload Windows artifact
        uses: actions/upload-artifact@v4
        with:
          name: windows-release
          path: app/mentore_app/build/windows/x64/runner/Release

  create-github-release:
    name: Create GitHub Release
    needs:
      - build-release-android
      - build-release-ios
      - build-release-macos
      - build-release-linux
      - build-release-windows
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/download-artifact@v4
        with:
          path: release-artifacts

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: release-artifacts/**/*
