name: CI - Test & Analyze

on:
  pull_request:
    branches: [develop, main]
  push:
    branches: [develop]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  analyze-and-test:
    name: Analyze & Test
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: app/mentore_app

    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Verify formatting
        run: dart format --set-exit-if-changed .

      - name: Run analyzer
        run: flutter analyze --no-pub

      - name: Run tests
        run: flutter test --coverage

  build-android:
    name: Build Android
    needs: analyze-and-test
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: app/mentore_app

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Build APK
        run: flutter build apk --debug

  build-ios:
    name: Build iOS (no codesign)
    needs: analyze-and-test
    runs-on: macos-latest
    defaults:
      run:
        working-directory: app/mentore_app

    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Build iOS
        run: flutter build ios --no-codesign

  build-macos:
    name: Build macOS
    needs: analyze-and-test
    runs-on: macos-latest
    defaults:
      run:
        working-directory: app/mentore_app

    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Build macOS
        run: flutter build macos --debug

  build-linux:
    name: Build Linux
    needs: analyze-and-test
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: app/mentore_app

    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Install Linux dependencies
        run: |
          sudo apt-get update -y
          sudo apt-get install -y ninja-build libgtk-3-dev

      - name: Install dependencies
        run: flutter pub get

      - name: Build Linux
        run: flutter build linux --debug

  build-windows:
    name: Build Windows
    needs: analyze-and-test
    runs-on: windows-latest
    defaults:
      run:
        working-directory: app/mentore_app

    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Build Windows
        run: flutter build windows --debug

  build-web:
    name: Build Web
    needs: analyze-and-test
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: app/mentore_app

    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Build Web
        run: flutter build web
